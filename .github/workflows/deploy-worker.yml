name: Deploy Worker

on:
  push:
    paths:
      - 'workers/analyze-food/**' # Só roda se algo mudar nesta pasta
    branches:
      - main
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Validar Configuração
        run: |
          MISSING=()
          [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && MISSING+=("CLOUDFLARE_API_TOKEN")
          [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ] && MISSING+=("CLOUDFLARE_ACCOUNT_ID")
          [ -z "${{ secrets.GEMINI_API_KEY }}" ] && MISSING+=("GEMINI_API_KEY")
          
          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "❌ ERRO: Os seguintes segredos estão faltando ou vazios no GitHub (Settings > Secrets > Actions):"
            for s in "${MISSING[@]}"; do echo "   - $s"; done
            echo "Acesse: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "✅ Todos os segredos necessários foram detectados."

      - name: Deploy com Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'workers/analyze-food'
          secrets: |
            GEMINI_API_KEY
          command: deploy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
