name: Deploy Worker

on:
  push:
    paths:
      - 'workers/analyze-food/**' # Só roda se algo mudar nesta pasta
    branches:
      - main
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Validar Configuração
        run: |
          MISSING=()
          [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && MISSING+=("CLOUDFLARE_API_TOKEN")
          [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ] && MISSING+=("CLOUDFLARE_ACCOUNT_ID")
          
          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "❌ ERRO: Segredos de acesso à Cloudflare faltando no GitHub."
            exit 1
          fi
          echo "✅ Configurações de acesso detectadas."

      - name: Deploy com Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'workers/analyze-food'
          command: deploy
