<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#3b82f6",
              "primary-container": "#93c5fd"
            },
            fontFamily: {
              sans: ["Plus Jakarta Sans", "sans-serif"]
            }
          }
        }
      }
    </script>
    <style>
      .clay-effect {
        box-shadow: 8px 8px 16px rgba(0,0,0,0.05), inset -4px -4px 8px rgba(0,0,0,0.05), inset 4px 4px 8px rgba(255,255,255,0.8);
        background-color: #eff6ff;
        border: none;
      }
      .clay-button {
        box-shadow: 4px 4px 8px rgba(0,0,0,0.05), inset -2px -2px 4px rgba(0,0,0,0.05), inset 2px 2px 4px rgba(255,255,255,0.8);
        background-color: #eff6ff;
        border: none;
        transition: all 0.2s ease-in-out;
      }
      .clay-button:active { transform: scale(0.95); }
      .clay-button:hover { filter: brightness(0.95); }
      
      body { 
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #eff6ff; 
      }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slide-up { from { opacity: 0; transform: translateY(60px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
      .animate-slide-up { animation: slide-up 0.4s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
      .animate-spin { animation: spin 1s linear infinite; }
      .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
    <title>Natofit - Performance de Elite</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
